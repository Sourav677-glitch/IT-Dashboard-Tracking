<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Admin Login</title>
   
</head>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Segoe UI", sans-serif;
  }

  html, body {
    width: 100%;
    min-height: 100%;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #dbeafe, #eff6ff, #f8fbff);
    overflow-x: hidden;
    overflow-y: auto;
    position: relative;
    color: #1e293b;
  }

  /* Animated background glow */
  .bg-shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.45;
    z-index: 0;
    animation: floatShape 10s ease-in-out infinite;
  }

  .shape1 {
    width: 250px;
    height: 250px;
    background: #60a5fa;
    top: 5%;
    left: 5%;
  }

  .shape2 {
    width: 280px;
    height: 280px;
    background: #a78bfa;
    bottom: 8%;
    right: 8%;
    animation-delay: 2s;
  }

  .shape3 {
    width: 180px;
    height: 180px;
    background: #38bdf8;
    bottom: 18%;
    left: 18%;
    animation-delay: 4s;
  }

  @keyframes floatShape {
    0%, 100% {
      transform: translateY(0px) translateX(0px);
    }
    50% {
      transform: translateY(-18px) translateX(15px);
    }
  }

  /* =========================
     HEADER
  ========================= */
  .login-header {
    position: relative;
    z-index: 2;
    width: calc(100% - 30px);
    margin: 16px auto 10px;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    border-radius: 24px;

    background: rgba(191, 219, 254, 0.45);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.45);
    box-shadow: 0 10px 28px rgba(59, 130, 246, 0.16);
  }

  .header-left,
  .header-right {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 80px;
  }

  .govt-logo {
    width: 72px;
    height: 72px;
    object-fit: contain;
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(10px);
    border-radius: 18px;
    padding: 8px;
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
    transition: transform 0.3s ease;
  }

  .govt-logo:hover {
    transform: scale(1.05);
  }

  .login-title {
    flex: 1;
    text-align: center;
    font-size: 28px;
    font-weight: 800;
    color: #0f172a;
    line-height: 1.3;
    padding: 0 10px;
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
  }

  /* =========================
     MAIN WRAPPER
  ========================= */
  .login-wrapper {
    position: relative;
    z-index: 2;
    min-height: calc(100vh - 220px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  /* =========================
     LOGIN CARD
  ========================= */
  .login-card {
    width: 100%;
    max-width: 430px;
    background: rgba(255, 255, 255, 0.58);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.35);
    box-shadow: 0 12px 35px rgba(31, 38, 135, 0.14);
    border-radius: 28px;
    padding: 38px 30px;
    text-align: center;
    animation: cardEntry 0.65s ease;
  }

  @keyframes cardEntry {
    from {
      opacity: 0;
      transform: translateY(28px) scale(0.96);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .login-logo {
    width: 92px;
    height: 92px;
    object-fit: contain;
    background: rgba(255,255,255,0.5);
    padding: 10px;
    border-radius: 20px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.08);
    margin-bottom: 18px;
  }

  .login-card h3 {
    font-size: 26px;
    color: #0f172a;
    margin-bottom: 8px;
    font-weight: 800;
  }

  .login-sub {
    color: #64748b;
    margin-bottom: 26px;
    font-size: 15px;
  }
.password-box {
  position: relative;
}

.password-box input {
  padding-right: 52px;
}

.toggle-password {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 38px;
  height: 38px;
  border: none;
  background: rgba(37, 99, 235, 0.08);
  color: #2563eb;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: none;
  margin: 0;
  padding: 0;
  transition: all 0.25s ease;
}

.toggle-password:hover {
  background: rgba(37, 99, 235, 0.14);
  transform: translateY(-50%) scale(1.05);
}

.toggle-password:active {
  transform: translateY(-50%) scale(0.98);
}

.toggle-password svg {
  width: 20px;
  height: 20px;
}

.toggle-password:focus {
  outline: none;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
}
  .input-group {
    margin-bottom: 18px;
    text-align: left;
  }

  .input-group label {
    display: block;
    margin-bottom: 8px;
    font-size: 14px;
    font-weight: 700;
    color: #334155;
  }

  .input-box {
    position: relative;
  }

  .input-box input {
    width: 100%;
    padding: 14px 15px;
    border-radius: 14px;
    border: 1px solid rgba(203, 213, 225, 0.9);
    outline: none;
    background: rgba(255,255,255,0.8);
    font-size: 15px;
    transition: all 0.25s ease;
  }

  .input-box input:focus {
    border-color: #2563eb;
    box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
  }

  button {
    width: 100%;
    border: none;
    padding: 14px;
    border-radius: 14px;
    background: linear-gradient(135deg, #2563eb, #7c3aed);
    color: white;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 14px 28px rgba(37, 99, 235, 0.28);
    transition: all 0.28s ease;
    margin-top: 6px;
  }

  button:hover {
    transform: translateY(-3px) scale(1.01);
    box-shadow: 0 18px 34px rgba(37, 99, 235, 0.32);
  }

  .login-note {
    margin-top: 20px;
    color: #64748b;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }

  /* =========================
     FOOTER
  ========================= */
  footer {
    position: relative;
    z-index: 2;
    width: calc(100% - 30px);
    margin: 10px auto 16px;
    text-align: center;
    padding: 18px 16px;
    font-size: 14px;
    color: #334155;
    font-weight: 700;
    border-radius: 22px;

    background: rgba(191, 219, 254, 0.42);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.42);
    box-shadow: 0 10px 28px rgba(59, 130, 246, 0.14);
  }

  /* =========================
     RESPONSIVE
  ========================= */
  @media (max-width: 1024px) {
    .login-wrapper {
      min-height: auto;
      padding: 24px 20px;
    }
  }

  @media (max-width: 768px) {
    .login-header {
      justify-content: center;
      text-align: center;
      padding: 16px 18px;
    }

    .login-title {
      order: 3;
      width: 100%;
      font-size: 22px;
    }

    .govt-logo {
      width: 62px;
      height: 62px;
    }

    .login-wrapper {
      padding: 18px 14px 24px;
      min-height: auto;
    }

    .login-card {
      padding: 30px 22px;
      border-radius: 22px;
    }

    .login-card h3 {
      font-size: 22px;
    }

    .login-logo {
      width: 78px;
      height: 78px;
    }

    footer {
      font-size: 13px;
      padding: 16px 12px;
    }
  }

  @media (max-width: 480px) {
    .login-header,
    footer {
      width: calc(100% - 18px);
      border-radius: 18px;
    }

    .login-title {
      font-size: 20px;
    }

    .login-card {
      padding: 26px 18px;
    }

    .login-card h3 {
      font-size: 20px;
    }

    .input-box input {
      padding: 13px 14px;
      font-size: 14px;
    }

    button {
      padding: 13px;
      font-size: 15px;
    }
  }
</style>
<body>

  <!-- Background Shapes -->
  <div class="bg-shape shape1"></div>
  <div class="bg-shape shape2"></div>
  <div class="bg-shape shape3"></div>

  <!-- HEADER -->
  <header class="login-header">
    <div class="header-left">
      <img src="WB logo.png" alt="Logo" class="govt-logo">
    </div>

    <h1 class="login-title">
      IT Equipment Maintenance Management System
    </h1>

    <div class="header-right">
      <img src="nhm.png" alt="NHM Logo" class="govt-logo">
    </div>
  </header>

  <!-- LOGIN CONTAINER -->
  <div class="login-wrapper">
    <div class="login-card">

      <!-- LOGO -->
      <img src="Picture1.png" alt="Govt Logo" class="login-logo">

      <h3>Administrator Login</h3>
      <p class="login-sub">Secure access for authorized personnel</p>

      <div class="input-group">
        <label>Username</label>
        <div class="input-box">
          <input type="text" id="username" placeholder="Enter Username"
            autocomplete="off" autocorrect="off" spellcheck="false">
        </div>
      </div>

      <div class="input-group">
  <label for="password">Password</label>
  <div class="input-box password-box">
    <input type="password" id="password" placeholder="Enter password" required />
    <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password">
      <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
        <circle cx="12" cy="12" r="3"></circle>
      </svg>

      <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a21.77 21.77 0 0 1 5.06-5.94"></path>
        <path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a21.8 21.8 0 0 1-3.17 4.39"></path>
        <path d="M1 1l22 22"></path>
        <path d="M10.58 10.58a2 2 0 0 0 2.83 2.83"></path>
        <path d="M9.88 5.09 4.09 10.88"></path>
      </svg>
    </button>
  </div>
</div>

      <button onclick="login()">🔐 Login</button>

      <p class="login-note">
        Authorized personnel only
      </p>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    Health and Family Welfare, Govt. of West Bengal
  </footer>

  <script>
  const scriptURL = "https://script.google.com/macros/s/AKfycbwyLnf5LjucQMPEOMEevp3cMWoFLRiicUWJgs-wm9d93eK-sLJWMrHS91NdpGQaojoK/exec";

  function login() {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();

    // Basic validation
    if (!u || !p) {
      alert("Please enter both Username and Password");
      return;
    }

    const fd = new FormData();
    fd.append("action", "login");
    fd.append("username", u);
    fd.append("password", p);

    fetch(scriptURL, { method: "POST", body: fd })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          localStorage.setItem("role", data.role);
          location.href = "dashboard.html";
        } else {
          alert("Invalid credentials");
        }
      })
      .catch(() => {
        alert("Login failed. Please try again.");
      });
  }

  // Enter key login
  document.getElementById("username").addEventListener("keypress", function(e) {
    if (e.key === "Enter") login();
  });

  document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") login();
  });
  const togglePassword = document.getElementById("togglePassword");
  const passwordInput = document.getElementById("password");
  const eyeOpen = document.getElementById("eyeOpen");
  const eyeClosed = document.getElementById("eyeClosed");

  togglePassword.addEventListener("click", () => {
    const isPassword = passwordInput.type === "password";

    passwordInput.type = isPassword ? "text" : "password";
    eyeOpen.style.display = isPassword ? "none" : "block";
    eyeClosed.style.display = isPassword ? "block" : "none";
    togglePassword.setAttribute("aria-label", isPassword ? "Hide password" : "Show password");
  });
</script>

  <form autocomplete="off"></form>

</body>
</html>
